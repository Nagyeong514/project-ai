# config.yaml — 실험 전역 설정 (계획서 5절)
# 역할: 모델 엔드포인트 / 평가 가중치 / 샘플 수 / 생성 파라미터(temperature·seed) / 프롬프트·스키마 경로 정의.
# 아래 값은 구조를 보여주는 플레이스홀더 — 실제 엔드포인트·모델명·경로는 환경에 맞게 채운다. (로직 미구현 단계)

# ── 후보 모델 3종 (온프레미스, vLLM OpenAI 호환 / 4bit 양자화 통일 — 계획서 2·2.1) ──
candidate_models:
  - key: qwen
    served_model_name: Qwen2.5-72B-Instruct-AWQ      # TODO: vLLM 서빙 모델명
    base_url: http://localhost:8001/v1               # TODO
    api_key: EMPTY
  - key: exaone
    served_model_name: EXAONE-3.5-32B-Instruct-AWQ   # TODO
    base_url: http://localhost:8002/v1               # TODO
    api_key: EMPTY
  - key: llama
    served_model_name: Llama-3.3-70B-Instruct-AWQ    # TODO
    base_url: http://localhost:8003/v1               # TODO
    api_key: EMPTY

# ── 심판 모델 (후보와 다른 계열 — 계획서 3.5) ──
judge_model:
  key: judge
  served_model_name: DeepSeek-R1                     # TODO: DeepSeek-R1 / Qwen2.5-72B(별도) / Mistral-Large 급 중 택일
  base_url: http://localhost:8010/v1                 # TODO
  api_key: EMPTY

# ── 생성 파라미터 (전 모델 동일 고정 — 계획서 4) ──
generation:
  temperature: 0.2     # TODO: 확정값
  seed: 42
  max_tokens: 2048

# ── 평가 항목 가중치 (계획서 3.3 / 3.4, 합 = 1.0) ──
weights:
  faithfulness: 0.25
  accuracy: 0.20
  usefulness: 0.20
  codeswitch: 0.15
  fluency: 0.10
  format: 0.10

# ── 골든셋 / 프롬프트 / 스키마 경로 ──
paths:
  golden_set: data/golden_set/golden_set.jsonl
  system_prompt: prompts/system_prompt.txt
  user_prompt_template: prompts/user_prompt_template.txt
  glossary: prompts/glossary.md
  output_schema: prompts/output_schema.json
  judge_prompt: prompts/judge_prompt.txt
  rubric: prompts/rubric.md
  results_dir: results/raw
  figures_dir: results/figures

# ── 샘플 / 채점 / 통계 ──
sample_count: 100                  # 계획서 3.2 (층화추출 100개)
judge:
  position_randomization: true     # 계획서 3.5 (제시 순서 무작위화로 position bias 완화)
stats:
  test: paired_t_test              # 계획서 3.6
  alpha: 0.05
